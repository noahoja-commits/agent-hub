<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1120">
<title>Agent Hub</title>
<style>
  :root {
    --bg: #0b1120; --surface: #111827; --border: #1e293b; --hover: #1e293b;
    --text: #e2e8f0; --muted: #64748b; --blue: #3b82f6; --green: #22c55e;
    --yellow: #eab308; --red: #ef4444; --purple: #a78bfa; --orange: #f59e0b;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;padding-bottom:calc(72px + var(--safe-bottom))}
  /* Top bar */
  .topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px)}
  .topbar h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .topbar .stats{display:flex;gap:12px;font-size:.75rem;color:var(--muted)}
  .topbar .stats span{display:flex;align-items:center;gap:4px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.green{background:var(--green)} .dot.yellow{background:var(--yellow)} .dot.muted{background:var(--muted)}
  /* Content */
  .content{padding:1rem;max-width:800px;margin:0 auto}
  .view{display:none}
  .view.active{display:block}
  /* Quick actions row */
  .quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
  .qa-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem .5rem;text-align:center;cursor:pointer;color:var(--text);font-size:.75rem;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
  .qa-btn:hover,.qa-btn:active{background:var(--hover);border-color:var(--blue)}
  .qa-btn .icon{font-size:1.3rem}
  .qa-btn.email .icon{color:var(--blue)} .qa-btn.research .icon{color:var(--purple)}
  .qa-btn.content .icon{color:var(--green)} .qa-btn.fixit .icon{color:var(--orange)}
  /* Filter bar */
  .filter-bar{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .filter-bar button{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.35rem .85rem;color:var(--muted);font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .15s}
  .filter-bar button.active,.filter-bar button:hover{background:var(--blue);border-color:var(--blue);color:#fff}
  /* Task cards */
  .task-list{display:flex;flex-direction:column;gap:10px}
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;display:flex;gap:.75rem;align-items:flex-start;cursor:pointer;transition:border-color .15s}
  .task-card:hover,.task-card:active{border-color:var(--blue)}
  .task-card .icon-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
  .task-card .icon-badge.email{background:#1e3a5f}.task-card .icon-badge.research{background:#3b1e5f}
  .task-card .icon-badge.content{background:#1e5f3a}.task-card .icon-badge.fixit{background:#5f3a1e}
  .task-card .body{flex:1;min-width:0}
  .task-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:3px}
  .task-card .head strong{font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task-card .meta{font-size:.73rem;color:var(--muted)}
  .task-card .preview{font-size:.8rem;color:var(--muted);line-height:1.4;margin-top:4px;white-space:pre-wrap;word-break:break-word;max-height:4.2em;overflow:hidden}
  .task-card .actions{display:flex;gap:6px;margin-top:8px}
  .badge{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
  .badge.queued{background:#1e293b;color:var(--muted)} .badge.running{background:#1e3a5f;color:var(--blue)}
  .badge.awaiting_approval{background:#3b2e1a;color:var(--yellow)} .badge.completed{background:#1a3a1e;color:var(--green)}
  .badge.failed{background:#3a1a1a;color:var(--red)}
  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:5px;padding:.4rem .85rem;border-radius:8px;font-size:.78rem;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
  .btn:active{opacity:.7}
  .btn-primary{background:var(--blue);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn-success{background:var(--green);color:#fff}.btn-danger{background:var(--red);color:#fff}
  .btn-sm{padding:.25rem .6rem;font-size:.7rem}
  .btn-block{width:100%;justify-content:center}
  /* Bottom nav */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:var(--safe-bottom)}
  .bottom-nav button{flex:1;background:none;border:none;color:var(--muted);padding:.6rem .5rem .5rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.68rem;transition:color .15s}
  .bottom-nav button.active{color:var(--blue)}
  .bottom-nav button .nav-icon{font-size:1.2rem}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--safe-bottom)}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:1.5rem;width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
  .modal h3{font-size:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
  .modal .close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:4px 8px}
  .form-group{margin-bottom:1rem}
  .form-group label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:4px}
  .form-group select,.form-group input,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;color:var(--text);font-size:.85rem;outline:none;font-family:inherit;-webkit-appearance:none}
  .form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--blue)}
  .form-group textarea{min-height:70px;resize:vertical}
  .form-row{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
  /* Detail view */
  .detail-body pre{background:var(--bg);border-radius:8px;padding:.75rem;overflow-x:auto;font-size:.78rem;white-space:pre-wrap;word-break:break-word;line-height:1.5;border:1px solid var(--border);max-height:50vh;overflow-y:auto}
  .detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
  .detail-meta span{font-size:.75rem;background:var(--bg);padding:3px 10px;border-radius:8px}
  .copy-btn{position:absolute;top:8px;right:8px;background:var(--border);border:none;color:var(--text);padding:4px 8px;border-radius:6px;font-size:.7rem;cursor:pointer}
  .copy-btn:active{background:var(--blue)}
  /* Empty state */
  .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .empty .icon{font-size:3rem;margin-bottom:.5rem;opacity:.6}
  .empty p{font-size:.9rem}
  /* Toast */
  .toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:.5rem 1rem;border-radius:10px;font-size:.85rem;z-index:200;animation:fadeInOut 2s forwards}
  @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
  .rel{position:relative}
  /* Desktop: wider */
  @media(min-width:768px){
    .content{max-width:900px;padding:1.5rem 2rem}
    .quick-actions{grid-template-columns:repeat(4,1fr);gap:12px}
    .qa-btn{flex-direction:row;justify-content:center;gap:8px;padding:.75rem 1rem;font-size:.85rem}
    .qa-btn .icon{font-size:1.4rem}
    .task-card .head strong{font-size:.9rem}
    .modal{border-radius:16px;max-height:80vh}
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>🤖 Agent Hub</h1>
  <div class="stats">
    <span id="stat-tasks">—</span>
    <span id="stat-agents"><span class="dot green"></span> —</span>
  </div>
</div>

<!-- Content area -->
<div class="content">
  <!-- Tasks view -->
  <div id="view-tasks" class="view active">
    <div class="quick-actions" id="quick-actions"></div>
    <div class="filter-bar">
      <button class="active" onclick="setFilter('')">All</button>
      <button onclick="setFilter('queued')">Queued</button>
      <button onclick="setFilter('running')">Running</button>
      <button onclick="setFilter('awaiting_approval')">Needs Approval</button>
      <button onclick="setFilter('completed')">Done</button>
      <button onclick="setFilter('failed')">Failed</button>
    </div>
    <div class="task-list" id="task-list">
      <div class="empty"><div class="icon">📭</div><p>No tasks yet</p><p style="font-size:.8rem;margin-top:4px">Tap an action below to get started</p></div>
    </div>
  </div>

  <!-- Agents view -->
  <div id="view-agents" class="view">
    <div class="task-list" id="agents-list"></div>
  </div>

  <!-- Health view -->
  <div id="view-health" class="view">
    <div id="health-content" style="font-size:.85rem;line-height:1.6"></div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="active" onclick="showView('tasks')"><span class="nav-icon">📋</span>Tasks</button>
  <button onclick="showView('agents')"><span class="nav-icon">🔧</span>Agents</button>
  <button onclick="showView('health')"><span class="nav-icon">📊</span>Health</button>
  <button onclick="openCreateModal()"><span class="nav-icon">➕</span>New</button>
</nav>

<!-- Create task modal -->
<div class="modal-overlay" id="create-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>➕ New Task <button class="close" onclick="closeModal()">✕</button></h3>
    <div class="form-group">
      <label>Agent</label>
      <select id="task-agent" onchange="updateActions()" required>
        <option value="">Select agent...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Action</label>
      <select id="task-action" required><option value="">Select agent first</option></select>
    </div>
    <div class="form-group">
      <label>Parameters (JSON, optional)</label>
      <textarea id="task-params" placeholder='{"query": "latest AI news"}'></textarea>
    </div>
    <div class="form-group">
      <label>Route to</label>
      <select id="task-route">
        <option value="">Cloud (default)</option>
        <option value="local">Local PC</option>
      </select>
    </div>
    <div class="form-row">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="create-btn" onclick="createTask()">Create</button>
    </div>
  </div>
</div>

<!-- Task detail modal -->
<div class="modal-overlay" id="detail-modal" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detail-content"></div>
</div>

<script>
// ---- State ----
const API = '/api';
let AUTH_TOKEN = localStorage.getItem('ah_token') || '';
let pollTimer = null;
let currentFilter = '';
let currentView = 'tasks';
let agentsData = {};

// ---- Init ----
document.addEventListener('DOMContentLoaded', () => {
  if (!AUTH_TOKEN) { const t = prompt('Enter API token (or leave blank for none):'); if (t) { AUTH_TOKEN = t; localStorage.setItem('ah_token', t); } }
  refreshAll();
  pollTimer = setInterval(refreshTasks, 8000);
});

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (AUTH_TOKEN) opts.headers['Authorization'] = 'Bearer ' + AUTH_TOKEN;
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(API + path, opts);
  if (r.status === 401) { alert('Invalid token. Refresh and re-enter.'); localStorage.removeItem('ah_token'); AUTH_TOKEN = ''; }
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || r.statusText); }
  return r.json();
}

// ---- Views ----
function showView(name) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name)?.classList.add('active');
  document.querySelectorAll('.bottom-nav button').forEach((b,i) => b.classList.toggle('active', i === ['tasks','agents','health'].indexOf(name)));
  if (name === 'agents') renderAgents();
  if (name === 'health') renderHealth();
}

// ---- Quick actions ----
function renderQuickActions() {
  const qa = document.getElementById('quick-actions');
  const acts = [
    {agent:'email', action:'check_inbox', icon:'📧', label:'Check Inbox'},
    {agent:'research', action:'search', icon:'🔍', label:'Search Web'},
    {agent:'content', action:'create_doc', icon:'📝', label:'New Doc'},
    {agent:'fixit', action:'analyze_code', icon:'🔧', label:'Analyze Code'},
  ];
  qa.innerHTML = acts.map(a =>
    `<button class="qa-btn ${a.agent}" onclick="quickTask('${a.agent}','${a.action}')">
      <span class="icon">${a.icon}</span> ${a.label}
    </button>`).join('');
}

async function quickTask(agent, action) {
  try {
    await api('POST', '/tasks', {agent, action, params:{}});
    toast('Task created!');
    refreshTasks();
  } catch(e) { alert('Failed: ' + e.message); }
}

// ---- Tasks ----
async function refreshTasks() {
  try {
    let path = '/tasks?limit=50';
    if (currentFilter) path += '&status=' + currentFilter;
    const tasks = await api('GET', path);
    renderTaskList(tasks);
  } catch(e) { console.error(e); }
}

function renderTaskList(tasks) {
  const list = document.getElementById('task-list');
  if (!tasks.length) {
    list.innerHTML = '<div class="empty"><div class="icon">✅</div><p>No tasks</p></div>';
    return;
  }
  list.innerHTML = tasks.map(t => {
    const icon = {email:'📧',research:'🔍',content:'✍️',fixit:'🔧'}[t.agent] || '📌';
    const s = t.status.replace(/_/g,' ');
    const time = new Date(t.created_at).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const preview = (t.result?.summary || t.error || '').substring(0, 200);
    const actions = [];
    if (t.status === 'awaiting_approval') {
      actions.push(`<button class="btn btn-success btn-sm" onclick="event.stopPropagation();approveTask('${t.id}')">Approve</button>`);
      actions.push(`<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();cancelTask('${t.id}')">Reject</button>`);
    }
    if (t.status === 'queued' || t.status === 'running') {
      actions.push(`<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();cancelTask('${t.id}')">Cancel</button>`);
    }
    return `<div class="task-card" onclick="openDetail('${t.id}')">
      <div class="icon-badge ${t.agent}">${icon}</div>
      <div class="body">
        <div class="head"><strong>${t.agent}/${t.action}</strong><span class="badge ${t.status}">${s}</span></div>
        <div class="meta">${t.id.slice(0,8)} · ${time}</div>
        ${preview ? `<div class="preview">${escHtml(preview)}</div>` : ''}
        ${actions.length ? `<div class="actions">${actions.join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  refreshTasks();
}

async function approveTask(id) { await api('POST', `/tasks/${id}/approve`); toast('Approved!'); refreshTasks(); }
async function cancelTask(id) { await api('POST', `/tasks/${id}/cancel`); toast('Cancelled'); refreshTasks(); }

async function openDetail(id) {
  try {
    const t = await api('GET', `/tasks/${id}`);
    const content = document.getElementById('detail-content');
    const s = t.status.replace(/_/g,' ');
    const result = t.result ? JSON.stringify(t.result, null, 2) : (t.error || 'No result');
    content.innerHTML = `
      <h3>${t.agent}/${t.action} <button class="close" onclick="closeDetail()">✕</button></h3>
      <div class="detail-meta">
        <span>ID: ${t.id}</span><span class="badge ${t.status}">${s}</span>
        <span>${new Date(t.created_at).toLocaleString()}</span>
      </div>
      <div class="rel">
        <button class="copy-btn" onclick="copyText(\`${result.replace(/`/g,'\\`').replace(/\\/g,'\\\\')}\`)">Copy</button>
        <div class="detail-body"><pre>${escHtml(result)}</pre></div>
      </div>
      <div class="form-row" style="margin-top:1rem">
        ${t.status === 'awaiting_approval' ? `<button class="btn btn-success" onclick="approveTask('${t.id}');closeDetail()">✅ Approve</button><button class="btn btn-danger" onclick="cancelTask('${t.id}');closeDetail()">❌ Reject</button>` : ''}
        <button class="btn btn-outline" onclick="closeDetail()">Close</button>
      </div>`;
    document.getElementById('detail-modal').style.display = 'flex';
  } catch(e) { alert('Failed to load: ' + e.message); }
}

function closeDetail() { document.getElementById('detail-modal').style.display = 'none'; }

// ---- Create task ----
function openCreateModal() { document.getElementById('create-modal').style.display = 'flex'; updateAgentSelect(); }
function closeModal() { document.getElementById('create-modal').style.display = 'none'; }

async function createTask() {
  const agent = document.getElementById('task-agent').value;
  const action = document.getElementById('task-action').value;
  const route = document.getElementById('task-route').value;
  let params = {};
  try { const r = document.getElementById('task-params').value.trim(); if (r) params = JSON.parse(r); }
  catch(e) { alert('Invalid JSON'); return; }
  if (!agent || !action) { alert('Select agent and action'); return; }
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    await api('POST', '/tasks', {agent, action, params, route_to: route || undefined});
    closeModal(); toast('Task created!'); refreshTasks();
    document.getElementById('task-params').value = '';
  } catch(e) { alert('Failed: ' + e.message); }
  btn.disabled = false; btn.textContent = 'Create';
}

function updateActions() {
  const name = document.getElementById('task-agent').value;
  const sel = document.getElementById('task-action');
  if (!agentsData[name]) { sel.innerHTML = '<option>Select agent first</option>'; return; }
  sel.innerHTML = Object.entries(agentsData[name].capabilities).map(([a,d]) => `<option value="${a}">${a}</option>`).join('');
}

async function updateAgentSelect() {
  try { agentsData = await api('GET', '/agents');
    const sel = document.getElementById('task-agent');
    sel.innerHTML = '<option value="">Select...</option>' + Object.keys(agentsData).map(n => `<option value="${n}">${agentsData[n].name}</option>`).join('');
  } catch(e) {}
}

// ---- Agents ----
async function renderAgents() {
  try {
    const agents = await api('GET', '/agents');
    const locals = await api('GET', '/local-agents').catch(()=>({agents:[],count:0}));
    agentsData = agents;
    const list = document.getElementById('agents-list');
    let html = '';
    for (const [name, a] of Object.entries(agents)) {
      html += `<div class="task-card">
        <div class="icon-badge ${name}" style="font-size:1.5rem">${name==='email'?'📧':name==='research'?'🔍':name==='content'?'✍️':'🔧'}</div>
        <div class="body">
          <div class="head"><strong>${a.name}</strong></div>
          <div class="meta">${a.description}</div>
          <div style="margin-top:6px;font-size:.75rem;color:var(--muted)">
            ${Object.entries(a.capabilities).map(([act,desc]) => `<span style="display:inline-block;background:var(--bg);padding:2px 8px;border-radius:6px;margin:2px">${act}</span>`).join(' ')}
          </div>
        </div>
      </div>`;
    }
    if (locals.agents?.length) {
      html += `<div class="task-card" style="border-color:var(--green)">
        <div class="icon-badge" style="background:#1e5f3a;font-size:1.5rem">🖥️</div>
        <div class="body">
          <div class="head"><strong>Local PC Agents</strong><span class="badge completed">${locals.count} online</span></div>
          <div class="meta">${locals.agents.join(', ')}</div>
        </div>
      </div>`;
    }
    list.innerHTML = html || '<div class="empty"><p>No agents registered</p></div>';
  } catch(e) { document.getElementById('agents-list').innerHTML = '<div class="empty"><p>Error loading agents</p></div>'; }
}

// ---- Health ----
async function renderHealth() {
  try {
    const h = await api('GET', '/health');
    document.getElementById('health-content').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1rem">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center">
          <div style="font-size:2rem;font-weight:700;color:var(--green)">${h.status}</div><div style="font-size:.75rem;color:var(--muted)">Status</div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center">
          <div style="font-size:2rem;font-weight:700">${h.agents.length}</div><div style="font-size:.75rem;color:var(--muted)">Cloud Agents</div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center">
          <div style="font-size:2rem;font-weight:700">${h.local_agents}</div><div style="font-size:.75rem;color:var(--muted)">Local Agents</div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center">
          <div style="font-size:2rem;font-weight:700">${h.tasks_active}</div><div style="font-size:.75rem;color:var(--muted)">Active Tasks</div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center">
          <div style="font-size:2rem;font-weight:700">${h.tasks_total}</div><div style="font-size:.75rem;color:var(--muted)">Total Tasks</div></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem">
        <pre style="font-size:.75rem;white-space:pre-wrap;word-break:break-word">${escHtml(JSON.stringify(h,null,2))}</pre>
      </div>`;
  } catch(e) { document.getElementById('health-content').innerHTML = '<div class="empty"><p>Health check failed</p></div>'; }
}

// ---- Refresh all ----
async function refreshAll() {
  renderQuickActions();
  updateAgentSelect();
  refreshTasks();
  try {
    const h = await api('GET', '/health');
    document.getElementById('stat-tasks').innerHTML = `<span class="dot ${h.tasks_active ? 'yellow' : 'green'}"></span>${h.tasks_active || 0} active`;
    document.getElementById('stat-agents').innerHTML = `<span class="dot green"></span>${h.agents.length} agents`;
  } catch(e) {}
}

// ---- Helpers ----
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg) { const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function copyText(text) { navigator.clipboard?.writeText(text).then(()=>toast('Copied!')).catch(()=>{}); }
</script>
