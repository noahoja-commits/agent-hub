*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'VT323','Courier New',monospace;background:#000;color:var(--tx);min-height:100dvh;overflow-x:hidden;padding-bottom:calc(72px + var(--safe));cursor:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text x='2' y='18' font-size='20' fill='%23880000'>⛧</text></svg>") 12 12,auto}
/* Hellfire canvas */
#hellfire{position:fixed;inset:0;pointer-events:none;z-index:1}
/* Blood rain */
.blood-rain{position:fixed;inset:0;pointer-events:none;z-index:2}
.blood-drop{position:absolute;color:rgba(139,0,0,.4);font-size:20px;animation:fall linear forwards;text-shadow:0 0 5px rgba(200,0,0,.3)}
@keyframes fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}90%{opacity:.8}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}
/* CRT overlay */
.crt{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:998}
/* Spinning pentagram */
.pentagram{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:45vmin;color:rgba(139,0,0,.03);pointer-events:none;z-index:0;animation:spin 40s linear infinite;text-shadow:0 0 30px rgba(200,0,0,.05)}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
/* Demon spawn */
.demon-spawn{position:fixed;pointer-events:none;z-index:5;font-family:monospace;white-space:pre;font-size:8px;opacity:.15;animation:posses 4s ease-in-out forwards;text-shadow:0 0 8px rgba(200,0,0,.5)}
@keyframes posses{0%{opacity:0;transform:scale(.5) translateX(-20px)}20%{opacity:.25;transform:scale(1.5) translateX(10px)}80%{opacity:.2;transform:scale(1) translateX(0)}100%{opacity:0;transform:scale(3) translateX(50px)}}
/* Possession glitch */
.glitch{position:fixed;inset:0;pointer-events:none;z-index:997;background:rgba(255,0,0,.03);animation:none}
.glitch.active{animation:posGlitch .3s ease-out}
@keyframes posGlitch{0%{background:rgba(255,0,0,.15);transform:translate(12px,-8px)}25%{background:rgba(0,0,255,.1);transform:translate(-8px,5px)}50%{background:rgba(255,0,0,.12);transform:translate(4px,-3px)}75%{background:rgba(0,255,0,.08);transform:translate(-6px,2px)}100%{background:transparent;transform:translate(0)}}
/* Screen shake */
.shake{animation:shk .5s ease-out}
@keyframes shk{0%,100%{transform:translate(0)}10%{transform:translate(-8px,4px)}20%{transform:translate(6px,-3px)}30%{transform:translate(-5px,-5px)}40%{transform:translate(3px,6px)}50%{transform:translate(-2px,-2px)}60%{transform:translate(1px,3px)}70%,100%{transform:translate(0)}}
/* Latin flash */
.latin-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Nosifer',cursive;font-size:2rem;color:var(--gl);text-shadow:0 0 30px var(--gl),0 0 60px var(--bl);pointer-events:none;z-index:996;animation:latinFade 1.5s forwards}

@keyframes goatAppear{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-30deg)}40%{opacity:.2;transform:translate(-50%,-50%) scale(1.1) rotate(5deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(2) rotate(0deg)}}

/* bottom */

.field select,.field input,.field textarea{width:100%;background:#000;border:1px solid var(--bd);padding:.3rem .4rem;color:var(--tx);font-size:.55rem;outline:none;font-family:'VT323',monospace}

@media(min-width:768px){.agent-grid{grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:7px}.content{max-width:960px;padding:.7rem 1rem}.topbar h1{font-size:.9rem}}
</style>

// ═══════════ HELLFIRE PARTICLES ═══════════
function startHellfire(){let c=document.getElementById('hellfire');let ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;
  let particles=[];for(let i=0;i<50;i++)particles.push({x:Math.random()*c.width,y:c.height+Math.random()*200,r:1+Math.random()*3,s:.3+Math.random()*1.5,o:.02+Math.random()*.08,life:0,maxLife:60+Math.random()*120});

    let r=Math.random();
    if(r<.15){let g=document.getElementById('glitch-overlay');g.classList.add('active');setTimeout(()=>g.classList.remove('active'),350)}
    else if(r<.25){document.body.classList.add('shake');setTimeout(()=>document.body.classList.remove('shake'),550)}
    else if(r<.3){let l=document.createElement('div');l.className='latin-flash';l.textContent=['MALEDICTUS','SANGUIS INFERNI','VADE RETRO','⛧ 666 ⛧','DIABOLUS','MORTEM AETERNAM','LUX IN TENEBRIS','SALVE SATANA'][Math.floor(Math.random()*8)];document.body.appendChild(l);setTimeout(()=>l.remove(),1600)}
    else if(r<.35){let g=document.createElement('div');g.className='goat';g.textContent='🐐';document.body.appendChild(g);setTimeout(()=>g.remove(),2200)}
    else if(r<.38){document.body.classList.add('invert');setTimeout(()=>document.body.classList.remove('invert'),650)}
    let next=15000+Math.random()*30000;setTimeout(trigger,next)}
  setTimeout(trigger,20000)}

// ═══════════ SACRIFICE ANIMATION ═══════════
function sacrificeAnim(){document.body.classList.add('shake');
  for(let i=0;i<8;i++){setTimeout(()=>{let s=document.createElement('div');s.className='sacrifice';s.textContent='🩸';s.style.left=20+Math.random()*60+'%';s.style.top=30+Math.random()*40+'%';document.body.appendChild(s);setTimeout(()=>s.remove(),900)},i*80)}
  setTimeout(()=>document.body.classList.remove('shake'),900)}

// ═══════════ DARK AUDIO ═══════════
function startAudio(){
  try{let ctx=new(window.AudioContext||window.webkitAudioContext)();
    function drone(freq,vol){let o=ctx.createOscillator();let g=ctx.createGain();o.type='sawtooth';o.frequency.value=freq;g.gain.value=vol*.02;o.connect(g);g.connect(ctx.destination);o.start();return o}
    drone(40,.15);drone(53,.1);drone(80,.05);
    // Whisper generator
    setInterval(()=>{try{let o=ctx.createOscillator();let g=ctx.createGain();o.type='triangle';o.frequency.value=20+Math.random()*80;g.gain.value=Math.random()*.01;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);setTimeout(()=>o.stop(),400)}catch(e){}},5000+Math.random()*8000)}
  catch(e){/* audio not supported */}}

// ═══════════ API ═══════════
async function api(m,p,b){let o={method:m,headers:{}};if(TOKEN)o.headers['Authorization']='Bearer '+TOKEN;if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}let r=await fetch(API+p,o);if(r.status===401){alert('THY PASSWORD IS FALSE, MORTAL');localStorage.removeItem('ah_token');TOKEN=''}if(!r.ok){let e=await r.json().catch(()=>({}));throw new Error(e.detail||r.statusText)}return r.json()}

// ═══════════ RENDER ═══════════
function renderSigils(agents){
  let g=document.getElementById('agent-grid');let q=document.getElementById('quick-sigils');let h='';let qh='';
  for(let[k,a]of Object.entries(agents)){if(k==='orchestrator')continue;let d=demonThemes[k]||demonThemes.email;
    h+=`<div class="agent-card" style="--agent-color:${d.color}" onclick="touchSigil('${k}')"><span class="sigil" style="color:${d.color}">${d.sigil}</span><div class="name">${a.name||k}</div><div class="latin">${d.latin}</div><div class="latin">${d.epithet}</div><div class="power">⚡ ${Object.keys(a.capabilities||{}).length} RITES</div></div>`;
    qh+=`<button style="background:rgba(0,0,0,.5);border:1px solid ${d.color}33;color:${d.color};padding:.12rem .35rem;font-size:.45rem;font-family:'VT323',monospace;cursor:pointer" onclick="touchSigil('${k}');closePortal()">${d.sigil} ${a.name||k}</button>`;}
  g.innerHTML=h;q.innerHTML=qh}

function touchSigil(name){openPortal();document.getElementById('ritual-input').value=`${name} `;document.getElementById('ritual-input').focus()}

async function cast(agent,action,query=''){try{await api('POST','/api/tasks',{agent,action,params:{query}});whisper('⛧ RITUAL CAST ⛧');refreshTasks()}catch(e){alert(e.message)}}

async function refreshAll(){try{let a=await api('GET','/agents');agentsData=a;renderSigils(a);let h=await api('GET','/health');document.getElementById('stat-line').innerHTML=`<span style="color:var(--gl)">${h.agents.length} DEMONS BOUND</span> · <span style="color:var(--gd)">${h.tasks_active||0} CONJURING</span>`}catch(e){}refreshTasks()}

async function refreshTasks(){try{let p='/tasks?limit=40';if(filter)p+='&status='+filter;let tasks=await api('GET',p);renderScrolls(tasks)}catch(e){}}

function renderScrolls(tasks){
  let f=document.getElementById('grimoire');
  if(!tasks.length){f.innerHTML='<div class="void"><div class="icon">⛧</div><p>THE VOID IS SILENT</p><p style="font-size:.45rem;color:var(--mt);margin-top:2px">Cast a ritual to summon knowledge</p></div>';return}
  f.innerHTML=tasks.map(t=>{
    let d=demonThemes[t.agent]||demonThemes.email;let a=agentsData[t.agent]||{};
    let sClass={'queued':'pending','running':'conjuring','awaiting_approval':'approval','completed':'ascended','failed':'damned'}[t.status]||'pending';
    let sText={'queued':'PENDING','running':'⛧ CONJURING','awaiting_approval':'🩸 OFFERING NEEDED','completed':'ASCENDED','failed':'🔥 DAMNED'}[t.status]||t.status;
    let time=new Date(t.created_at).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    let preview=(t.result?.summary||t.error||'').substring(0,120);
    let acts='';
    if(t.status==='awaiting_approval')acts=`<button class="btn btn-blood btn-sm" onclick="event.stopPropagation();sacrificeAnim();doAct('${t.id}','approve')">🩸 OFFER BLOOD</button><button class="btn btn-sm" onclick="event.stopPropagation();doAct('${t.id}','cancel')">BANISH</button>`;
    if(t.status==='queued'||t.status==='running')acts=`<button class="btn btn-sm" onclick="event.stopPropagation();doAct('${t.id}','cancel')">BANISH</button>`;
    return`<div class="scroll" style="--agent-color:${d.color}" onclick="openDetail('${t.id}')">
      <div class="rune" style="color:${d.color}">${d.sigil}</div><div class="parch">
        <div class="phead"><strong>${d.latin}</strong><span class="mark ${sClass}">${sText}</span></div>
        <div class="pmeta">${time} · ${t.action}</div>${preview?`<div class="prune">${esc(preview)}</div>`:''}${acts?`<div class="pacts">${acts}</div>`:''}
      </div></div>`}).join('')}

// ═══════════ ACTIONS ═══════════
function setFilter(s){filter=s;document.querySelectorAll('.status-scroll button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');refreshTasks()}
async function doAct(id,act){await api('POST',`/tasks/${id}/${act}`);whisper(act==='approve'?'🩸 BLOOD ACCEPTED — SOUL ASCENDS 🩸':'⛧ BANISHED TO THE VOID ⛧');refreshTasks()}
function showMain(){document.querySelectorAll('.bottom button').forEach((b,i)=>b.classList.toggle('active',i===0))}
function openPortal(){document.getElementById('portal-veil').style.display='flex';document.getElementById('ritual-input').focus()}
function closePortal(){document.getElementById('portal-veil').style.display='none'}
async function castRitual(){let text=document.getElementById('ritual-input').value.trim();if(!text)return;closePortal();
  try{sacrificeAnim();await api('POST','/api/tasks',{agent:'orchestrator',action:'solve',params:{goal:text}});whisper('⛧ SUMMONING DEMONS ⛧');refreshTasks();document.getElementById('ritual-input').value=''}catch(e){alert(e.message)}}
async function openDetail(id){try{let t=await api('GET',`/tasks/${id}`);let d=demonThemes[t.agent]||demonThemes.email;let r=t.result?JSON.stringify(t.result,null,2):(t.error||'The void is silent...');
  document.getElementById('detail-scroll').innerHTML=`<h3>⛧ ${d.latin} · ${t.action} ⛧ <button class="close-btn" onclick="closeDetail()">✕</button></h3><div class="detail-p"><button class="copy-btn" onclick="navigator.clipboard.writeText(\`${r.replace(/`/g,'\\`')}\`);whisper('COPIED TO SCROLL')">COPY</button><pre>${esc(r)}</pre></div>`;document.getElementById('detail-veil').style.display='flex'}catch(e){alert(e.message)}}
function closeDetail(){document.getElementById('detail-veil').style.display='none'}

// ═══════════ VOICE ═══════════
function startVoice(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){whisper('VOICE NOT SUPPORTED');return}
  let rec=new SR();rec.lang='en-US';rec.interimResults=false;whisper('👂 THE VOID LISTENS...');rec.start();rec.onresult=function(e){let text=e.results[0][0].transcript;openPortal();document.getElementById('ritual-input').value=text;castRitual()};rec.onerror=function(){whisper('VOICE FAILED')}}

// ═══════════ UTILS ═══════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function whisper(m){let t=document.createElement('div');t.className='whisper';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}

let sixCount=0;document.addEventListener('keydown',e=>{if(e.key==='6'){sixCount++;if(sixCount>=3){sixCount=0;document.body.classList.add('invert');setTimeout(()=>document.body.classList.remove('invert'),666);
    for(let i=0;i<13;i++)setTimeout(()=>{let s=document.createElement('div');s.className='sacrifice';s.textContent='666';s.style.left=Math.random()*80+'%';s.style.top=Math.random()*80+'%';s.style.fontFamily='Eater';s.style.color='var(--gl)';s.style.fontSize='4vmin';document.body.appendChild(s);setTimeout(()=>s.remove(),1200)},i*100)}}else{sixCount=0}});
