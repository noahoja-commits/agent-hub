<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0000">
<title>ABYSSAL TERMINAL v666</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  :root {
    --bg: #0a0000; --surface: #110505; --border: #2a0a0a; --hover: #1a0505;
    --text: #cc2222; --muted: #661111; --glow: #ff2200; --gold: #cc9900;
    --blood: #8b0000; --void: #050510; --safe: env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'VT323','Courier New',monospace;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-bottom:calc(68px + var(--safe))}
  /* CRT overlay */
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}
  /* Pentagram background */
  body::before{content:'⛧';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40vmin;color:rgba(139,0,0,.03);pointer-events:none;z-index:0}
  /* Top bar */
  .topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(17,5,5,.95),rgba(10,0,0,.9));backdrop-filter:blur(8px);border-bottom:2px solid var(--blood);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-family:'Press Start 2P',monospace;font-size:.65rem;color:var(--glow);text-shadow:0 0 10px var(--glow),0 0 20px var(--blood);letter-spacing:2px;animation:flicker 4s infinite}
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.4}94%{opacity:1}96%{opacity:.3}97%{opacity:1}}
  .topbar .ritual{font-size:.7rem;color:var(--gold);text-shadow:0 0 5px var(--gold)}
  .topbar .pulse{display:flex;align-items:center;gap:5px;font-size:.6rem;color:var(--muted)}
  .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--glow);box-shadow:0 0 6px var(--glow);animation:beat 1.5s infinite}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
  /* Content */
  .content{position:relative;z-index:1;padding:.6rem;max-width:900px;margin:0 auto}
  /* Agent pentagram grid */
  .agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:1rem}
  .agent-card{background:linear-gradient(180deg,var(--surface),#0a0000);border:1px solid var(--border);border-radius:0;text-align:center;padding:.7rem .5rem;cursor:pointer;transition:all .2s;position:relative;clip-path:polygon(0% 5%,5% 0%,95% 0%,100% 5%,100% 95%,95% 100%,5% 100%,0% 95%)}
  .agent-card::before{content:'';position:absolute;inset:0;background:var(--agent-color,var(--blood));opacity:0;transition:opacity .3s;z-index:-1}
  .agent-card:hover::before,.agent-card:active::before{opacity:.08}
  .agent-card:hover,.agent-card:active{border-color:var(--agent-color,var(--blood));box-shadow:0 0 15px var(--agent-color,var(--blood))}
  .agent-card .sigil{font-size:1.8rem;display:block;margin-bottom:.3rem;text-shadow:0 0 8px currentColor}
  .agent-card .title{font-size:.7rem;font-weight:700;color:var(--agent-color,var(--text));letter-spacing:1px}
  .agent-card .cursetext{font-size:.55rem;color:var(--muted);line-height:1.2;margin-top:2px}
  .agent-card .power{font-size:.5rem;color:var(--gold);margin-top:3px}
  /* Ritual bar */
  .ritual-bar{display:flex;gap:6px;margin-bottom:.8rem;overflow-x:auto}
  .ritual-bar button{flex-shrink:0;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.35rem .8rem;font-size:.6rem;font-family:'VT323',monospace;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
  .ritual-bar button:hover,.ritual-bar button:active{border-color:var(--blood);color:var(--glow);text-shadow:0 0 5px var(--glow)}
  /* Scroll of status */
  .status-scroll{display:flex;gap:5px;margin-bottom:.8rem;overflow-x:auto}
  .status-scroll button{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:0;padding:.25rem .7rem;color:var(--muted);font-size:.55rem;font-family:'VT323',monospace;cursor:pointer;text-transform:uppercase;transition:all .15s}
  .status-scroll button.active,.status-scroll button:hover{border-color:var(--gold);color:var(--gold);background:rgba(204,153,0,.1)}
  /* Task grimoire */
  .grimoire{display:flex;flex-direction:column;gap:6px}
  .scroll-entry{background:linear-gradient(90deg,var(--surface),#0a0000);border:1px solid var(--border);padding:.6rem .7rem;display:flex;gap:.55rem;cursor:pointer;transition:border-color .2s;animation:manifest .3s ease}
  @keyframes manifest{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
  .scroll-entry:active{border-color:var(--blood)}
  .scroll-entry .rune{font-size:1.1rem;flex-shrink:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border)}
  .scroll-entry .parchment{flex:1;min-width:0}
  .scroll-entry .phead{display:flex;justify-content:space-between;align-items:center;gap:.5rem;margin-bottom:1px}
  .scroll-entry .phead strong{font-size:.7rem;color:var(--agent-color,var(--text))}
  .scroll-entry .pmeta{font-size:.55rem;color:var(--muted)}
  .scroll-entry .prune{font-size:.6rem;color:#661515;line-height:1.3;margin-top:2px;white-space:pre-wrap;word-break:break-word;max-height:3em;overflow:hidden}
  .scroll-entry .pacts{display:flex;gap:3px;margin-top:4px}
  .mark{font-size:.5rem;padding:1px 6px;border:1px solid;font-family:'VT323',monospace;text-transform:uppercase}
  .mark.queued{border-color:#331;color:#661;background:rgba(102,102,17,.1)}
  .mark.conjuring{border-color:var(--blood);color:var(--glow);background:rgba(139,0,0,.15);animation:beat 2s infinite}
  .mark.awaiting_approval{border-color:var(--gold);color:var(--gold);background:rgba(204,153,0,.1)}
  .mark.ritual_complete{border-color:#0a2a0a;color:#226622;background:rgba(34,102,34,.1)}
  .mark.cursed{border-color:var(--blood);color:#ff4444;background:rgba(255,0,0,.1)}
  .btn{display:inline-flex;align-items:center;gap:3px;padding:.25rem .6rem;font-size:.55rem;font-family:'VT323',monospace;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);text-transform:uppercase;letter-spacing:1px;transition:all .15s}.btn:active{opacity:.6}
  .btn-blood{background:var(--blood);border-color:var(--blood);color:#fff;text-shadow:0 0 5px rgba(255,255,255,.3)}
  .btn-gold{border-color:var(--gold);color:var(--gold)}
  .btn-sm{padding:.15rem .4rem;font-size:.5rem}
  /* Bottom nav */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(17,5,5,.95),rgba(10,0,0,.9));backdrop-filter:blur(8px);border-top:2px solid var(--blood);display:flex;z-index:50;padding-bottom:var(--safe)}
  .bottom-nav button{flex:1;background:none;border:none;color:var(--muted);padding:.5rem .3rem .4rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.55rem;font-family:'VT323',monospace;text-transform:uppercase;transition:color .15s}
  .bottom-nav button.active{color:var(--glow);text-shadow:0 0 5px var(--glow)}
  .bottom-nav .nav-rune{font-size:1rem}
  /* Modal */
  .veil{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--safe)}
  .portal{background:linear-gradient(180deg,var(--surface),#0a0000);border:1px solid var(--blood);border-bottom:none;padding:1rem;width:100%;max-width:540px;max-height:85vh;overflow-y:auto}
  .portal h3{font-family:'Press Start 2P',monospace;font-size:.55rem;color:var(--glow);margin-bottom:.7rem;display:flex;justify-content:space-between;align-items:center;text-shadow:0 0 8px var(--glow)}
  .portal .close-rune{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer}
  .form-field{margin-bottom:.7rem}.form-field label{display:block;font-size:.55rem;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:1px}
  .form-field select,.form-field input,.form-field textarea{width:100%;background:var(--bg);border:1px solid var(--border);padding:.4rem .5rem;color:var(--text);font-size:.65rem;outline:none;font-family:'VT323',monospace}
  .form-field select:focus,.form-field input:focus,.form-field textarea:focus{border-color:var(--blood)}
  .form-field textarea{min-height:55px;resize:vertical}
  .form-btns{display:flex;justify-content:flex-end;gap:5px;margin-top:.7rem}
  .detail-parchment{position:relative}
  .detail-parchment pre{background:var(--bg);border:1px solid var(--border);padding:.6rem;overflow-x:auto;font-size:.6rem;white-space:pre-wrap;word-break:break-word;line-height:1.4;max-height:40vh;overflow-y:auto;font-family:'VT323',monospace}
  .copy-rune{position:absolute;top:4px;right:4px;background:var(--border);border:none;color:var(--muted);padding:2px 5px;font-size:.5rem;cursor:pointer;font-family:'VT323',monospace}
  .void-state{text-align:center;padding:2.5rem 1rem;color:var(--muted)}.void-state .icon{font-size:2.5rem;margin-bottom:.3rem;opacity:.3}
  .whisper{position:fixed;top:.8rem;left:50%;transform:translateX(-50%);background:var(--blood);border:1px solid var(--glow);color:#fff;padding:.3rem .7rem;font-size:.6rem;font-family:'VT323',monospace;z-index:200;animation:whisperFade 2s forwards;text-shadow:0 0 5px rgba(255,255,255,.3)}
  @keyframes whisperFade{0%{opacity:0;transform:translateX(-50%) translateY(-6px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
  @media(min-width:768px){.agent-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}.content{max-width:960px;padding:.8rem 1.2rem}.topbar h1{font-size:.75rem}}
</style>
</head>
<body>

<div class="topbar">
  <h1>⛧ ABYSSAL TERMINAL v666 ⛧</h1>
  <div class="pulse"><span class="pulse-dot"></span><span id="stat-line">AWAITING RITUAL...</span></div>
</div>

<div class="content">
  <div id="view-main">
    <div class="agent-grid" id="agent-grid"></div>
    <div class="ritual-bar">
      <button onclick="invoke('email','triage_inbox')">📜 Scry Inbox</button>
      <button onclick="invoke('research','search','latest AI news')">🔮 Seek Knowledge</button>
      <button onclick="invoke('dev','write_code','web scraper')">⚡ Forge Script</button>
      <button onclick="invoke('image','generate','dark cathedral')">🎨 Conjure Image</button>
    </div>
    <div class="status-scroll">
      <button class="active" onclick="setFilter('')">All Rites</button>
      <button onclick="setFilter('running')">Conjuring</button>
      <button onclick="setFilter('awaiting_approval')">Requires Blood</button>
      <button onclick="setFilter('completed')">Ritual Complete</button>
      <button onclick="setFilter('failed')">Cursed</button>
    </div>
    <div class="grimoire" id="grimoire"><div class="void-state"><div class="icon">⛧</div><p>The grimoire awaits your command</p><p style="font-size:.55rem;margin-top:3px">Invoke a ritual or speak to the abyss</p></div></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="active" onclick="showMain()"><span class="nav-rune">⛧</span>Grimoire</button>
  <button onclick="openPortal()"><span class="nav-rune">🔮</span>Invoke</button>
</nav>

<div id="portal-veil" class="veil" style="display:none" onclick="if(event.target===this)closePortal()">
  <div class="portal"><h3>⛧ INVOKE RITUAL ⛧ <button class="close-rune" onclick="closePortal()">✕</button></h3>
    <div id="quick-sigils" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.7rem"></div>
    <div class="form-field"><label>Speak thy command</label><textarea id="ritual-input" placeholder="search the web for dark programming secrets...&#10;scry mine inbox for urgent messages...&#10;forge a script that scrapes the void..."></textarea></div>
    <div class="form-btns"><button class="btn" onclick="closePortal()">Flee</button><button class="btn btn-blood" onclick="castRitual()">Cast Ritual</button></div>
  </div>
</div>

<div id="detail-veil" class="veil" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="portal" id="detail-scroll"></div>
</div>

<script>
const API='/api';let TOKEN=localStorage.getItem('ah_token')||'';let filter='';let agentsData={};let pollTimer;

document.addEventListener('DOMContentLoaded',()=>{if(!TOKEN){TOKEN=prompt('Speak the password:')||'';if(TOKEN)localStorage.setItem('ah_token',TOKEN)}refreshAll();pollTimer=setInterval(refreshTasks,5000)});

async function api(m,p,b){let o={method:m,headers:{}};if(TOKEN)o.headers['Authorization']='Bearer '+TOKEN;if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}let r=await fetch(API+p,o);if(r.status===401){alert('Thy password is false');localStorage.removeItem('ah_token');TOKEN=''}if(!r.ok){let e=await r.json().catch(()=>({}));throw new Error(e.detail||r.statusText)}return r.json()}

function showMain(){document.querySelectorAll('.bottom-nav button').forEach((b,i)=>b.classList.toggle('active',i===0))}

function renderSIGILS(agents){
  let g=document.getElementById('agent-grid');let q=document.getElementById('quick-sigils');
  let h='';let qh='';let themes={'email':['📜','#cc2222'],'research':['🔮','#cc44cc'],'content':['📖','#44cc44'],'fixit':['⚒️','#cc9900'],'dev':['💀','#44cccc'],'image':['🎨','#cc4488']};
  for(let[k,a]of Object.entries(agents)){
    if(k==='orchestrator')continue;let t=themes[k]||['⛧','#cc2222'];
    let col=t[1];h+=`<div class="agent-card" style="--agent-color:${col}" onclick="touchSigil('${k}')"><span class="sigil" style="color:${col}">${t[0]}</span><div class="title">${a.name||k}</div><div class="cursetext">${(a.personality||'').slice(0,50)}</div><div class="power">⚡ ${Object.keys(a.capabilities||{}).length} rites</div></div>`;
    qh+=`<button style="background:rgba(0,0,0,.3);border:1px solid ${col}44;color:${col};padding:.2rem .5rem;font-size:.55rem;font-family:'VT323',monospace;cursor:pointer" onclick="touchSigil('${k}');closePortal()">${t[0]} ${a.name||k}</button>`;
  }
  g.innerHTML=h;q.innerHTML=qh;
}

function touchSigil(name){let a=agentsData[name];if(!a)return;openPortal();let inp=document.getElementById('ritual-input');inp.value=`${name} `;inp.focus()}

async function invoke(agent,action,query=''){try{await api('POST','/api/tasks',{agent,action,params:{query}});whisper('Ritual cast!');refreshTasks()}catch(e){alert(e.message)}}

async function refreshAll(){try{let a=await api('GET','/agents');agentsData=a;renderSIGILS(a);let h=await api('GET','/health');document.getElementById('stat-line').textContent=`${h.agents.length} ENTITIES · ${h.tasks_active||0} CONJURING`}catch(e){}refreshTasks()}

async function refreshTasks(){try{let p='/tasks?limit=40';if(filter)p+='&status='+filter;let tasks=await api('GET',p);renderScrolls(tasks)}catch(e){}}

function renderScrolls(tasks){
  let f=document.getElementById('grimoire');
  if(!tasks.length){f.innerHTML='<div class="void-state"><div class="icon">⛧</div><p>The grimoire awaits</p></div>';return}
  f.innerHTML=tasks.map(t=>{
    let a=agentsData[t.agent]||{};let col={'email':'#cc2222','research':'#cc44cc','content':'#44cc44','fixit':'#cc9900','dev':'#44cccc','image':'#cc4488'}[t.agent]||'#cc2222';
    let s=t.status==='running'?'conjuring':t.status==='completed'?'ritual_complete':t.status==='awaiting_approval'?'awaiting_approval':t.status==='failed'?'cursed':'queued';
    let sl={'queued':'PENDING','running':'CONJURING','awaiting_approval':'NEEDS BLOOD','completed':'COMPLETE','failed':'CURSED'}[t.status]||t.status;
    let time=new Date(t.created_at).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    let preview=(t.result?.summary||t.error||'').substring(0,150);
    let acts='';
    if(t.status==='awaiting_approval')acts=`<button class="btn btn-blood btn-sm" onclick="event.stopPropagation();doAct('${t.id}','approve')">Offer Blood</button><button class="btn btn-sm" onclick="event.stopPropagation();doAct('${t.id}','cancel')">Banish</button>`;
    if(t.status==='queued'||t.status==='running')acts=`<button class="btn btn-sm" onclick="event.stopPropagation();doAct('${t.id}','cancel')">Banish</button>`;
    return`<div class="scroll-entry" style="--agent-color:${col}" onclick="openDetail('${t.id}')">
      <div class="rune" style="color:${col}">⛧</div><div class="parchment">
        <div class="phead"><strong>${a.name||t.agent}</strong><span class="mark ${s}">${sl}</span></div>
        <div class="pmeta">${time} · ${t.action}</div>
        ${preview?`<div class="prune">${esc(preview)}</div>`:''}
        ${acts?`<div class="pacts">${acts}</div>`:''}
      </div></div>`
  }).join('')}

function setFilter(s){filter=s;document.querySelectorAll('.status-scroll button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');refreshTasks()}
async function doAct(id,act){await api('POST',`/tasks/${id}/${act}`);whisper(act==='approve'?'Blood accepted':'Banished');refreshTasks()}

function openPortal(){document.getElementById('portal-veil').style.display='flex';document.getElementById('ritual-input').focus()}
function closePortal(){document.getElementById('portal-veil').style.display='none'}
async function castRitual(){let text=document.getElementById('ritual-input').value.trim();if(!text)return;closePortal();
  try{await api('POST','/api/tasks',{agent:'orchestrator',action:'solve',params:{goal:text}});whisper('Invoking the abyss...');refreshTasks();document.getElementById('ritual-input').value=''}catch(e){alert(e.message)}}

async function openDetail(id){try{let t=await api('GET',`/tasks/${id}`);let a=agentsData[t.agent]||{};let r=t.result?JSON.stringify(t.result,null,2):(t.error||'The void returns nothing');document.getElementById('detail-scroll').innerHTML=`<h3>⛧ ${a.name||t.agent} · ${t.action} ⛧ <button class="close-rune" onclick="closeDetail()">✕</button></h3><div class="detail-parchment"><button class="copy-rune" onclick="navigator.clipboard.writeText(\`${r.replace(/`/g,'\\`')}\`);whisper('Copied to scroll')">COPY</button><pre>${esc(r)}</pre></div>`;document.getElementById('detail-veil').style.display='flex'}catch(e){alert(e.message)}}
function closeDetail(){document.getElementById('detail-veil').style.display='none'}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function whisper(m){let t=document.createElement('div');t.className='whisper';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
</script>
</body>
</html>
