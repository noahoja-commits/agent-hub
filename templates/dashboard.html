<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050510">
<title>Agent Hub — Command Center</title>
<style>
  :root {
    --bg: #050510; --surface: #0a0a20; --border: #1a1a3a; --hover: #1e1e3a;
    --text: #e8e8f0; --muted: #6b6b8a; --safe-bottom: env(safe-area-inset-bottom,0px);
    --gradient: linear-gradient(135deg,#8b5cf6,#3b82f6,#10b981,#f59e0b,#ec4899);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:calc(72px + var(--safe-bottom))}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(139,92,246,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(59,130,246,.05) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(16,185,129,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,32,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:1.05rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .topbar .pulse{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--muted)}
  .topbar .pulse-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .content{position:relative;z-index:1;padding:.75rem;max-width:900px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  /* Agent grid */
  .agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:1.2rem}
  .agent-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1rem .75rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .agent-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--agent-color,var(--border))}
  .agent-card:hover,.agent-card:active{transform:translateY(-2px);border-color:var(--agent-color,var(--blue));box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .agent-card .emoji{font-size:2rem;margin-bottom:.4rem;display:block}
  .agent-card .aname{font-size:.85rem;font-weight:700;margin-bottom:2px}
  .agent-card .persona{font-size:.65rem;color:var(--muted);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .agent-card .caps-count{font-size:.6rem;color:var(--agent-color,var(--muted));margin-top:4px}
  /* Quick bar */
  .quick-bar{display:flex;gap:8px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px}
  .quick-bar button{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:.45rem 1rem;color:var(--text);font-size:.78rem;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s}
  .quick-bar button:hover,.quick-bar button:active{background:var(--hover);border-color:#334155}
  /* Status bar */
  .status-bar{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto}
  .status-bar button{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.3rem .8rem;color:var(--muted);font-size:.72rem;cursor:pointer;transition:all .15s}
  .status-bar button.active,.status-bar button:hover{background:#1e1e3a;border-color:#3b82f6;color:#fff}
  /* Task feed */
  .task-feed{display:flex;flex-direction:column;gap:8px}
  .task-msg{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.7rem .9rem;display:flex;gap:.65rem;cursor:pointer;transition:border-color .15s;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .task-msg:active{border-color:var(--agent-color,#3b82f6)}
  .task-msg .t-emoji{font-size:1.3rem;flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--agent-color-bg,#1e1e3a)}
  .task-msg .t-body{flex:1;min-width:0}
  .task-msg .t-head{display:flex;justify-content:space-between;align-items:center;gap:.5rem;margin-bottom:2px}
  .task-msg .t-head strong{font-size:.82rem}
  .task-msg .t-meta{font-size:.67rem;color:var(--muted)}
  .task-msg .t-preview{font-size:.76rem;color:#9ca3af;line-height:1.4;margin-top:3px;white-space:pre-wrap;word-break:break-word;max-height:3.5em;overflow:hidden}
  .task-msg .t-actions{display:flex;gap:4px;margin-top:6px}
  .badge{font-size:.62rem;padding:1px 7px;border-radius:9px;font-weight:500;white-space:nowrap}
  .badge.queued{background:#1e1e3a;color:#6b6b8a}.badge.running{background:#1e2a4a;color:#60a5fa;animation:pulse 2s infinite}
  .badge.awaiting_approval{background:#2a1e1a;color:#f59e0b}.badge.completed{background:#1a2a1e;color:#22c55e}
  .badge.failed{background:#2a1a1a;color:#ef4444}
  .btn{display:inline-flex;align-items:center;gap:4px;padding:.35rem .75rem;border-radius:8px;font-size:.72rem;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}.btn:active{opacity:.7}
  .btn-primary{background:#3b82f6;color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn-success{background:#22c55e;color:#fff}.btn-danger{background:#ef4444;color:#fff}.btn-sm{padding:.2rem .5rem;font-size:.65rem}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,32,.9);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:var(--safe-bottom)}
  .bottom-nav button{flex:1;background:none;border:none;color:var(--muted);padding:.55rem .4rem .45rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.65rem;transition:color .15s}
  .bottom-nav button.active{color:#8b5cf6}.bottom-nav .nav-emoji{font-size:1.1rem}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--safe-bottom)}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:1.3rem;width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
  .modal h3{font-size:.95rem;margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center}
  .modal .close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}
  .form-group{margin-bottom:.8rem}.form-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:3px}
  .form-group select,.form-group input,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;color:var(--text);font-size:.8rem;outline:none;font-family:inherit}
  .form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:#8b5cf6}
  .form-group textarea{min-height:60px;resize:vertical}.form-row{display:flex;justify-content:flex-end;gap:6px;margin-top:.8rem}
  .detail-body pre{background:var(--bg);border-radius:8px;padding:.7rem;overflow-x:auto;font-size:.72rem;white-space:pre-wrap;word-break:break-word;line-height:1.5;border:1px solid var(--border);max-height:45vh;overflow-y:auto}
  .copy-btn{position:absolute;top:6px;right:6px;background:var(--border);border:none;color:var(--text);padding:3px 7px;border-radius:5px;font-size:.65rem;cursor:pointer}.copy-btn:active{background:#3b82f6}
  .rel{position:relative}
  .empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}.empty .icon{font-size:2.5rem;margin-bottom:.4rem;opacity:.5}
  .toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:.4rem .9rem;border-radius:10px;font-size:.78rem;z-index:200;animation:fadeInOut 2s forwards}
  @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
  @media(min-width:768px){.agent-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}.content{max-width:960px;padding:1rem 1.5rem}}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚡ Agent Hub</h1>
  <div class="pulse"><span class="pulse-dot"></span><span id="stat-line">connecting...</span></div>
</div>

<div class="content">
  <div id="view-main" class="view active">
    <div class="agent-grid" id="agent-grid"></div>
    <div class="quick-bar">
      <button onclick="quickCmd('email','check_inbox')">📬 Check Inbox</button>
      <button onclick="quickCmd('research','search','latest AI news')">🔭 Search Web</button>
      <button onclick="quickCmd('dev','write_code','web scraper')">💻 Write Code</button>
      <button onclick="quickCmd('image','generate','sunset mountains')">🎨 Generate Art</button>
    </div>
    <div class="status-bar">
      <button class="active" onclick="setFilter('')">All</button>
      <button onclick="setFilter('running')">Running</button>
      <button onclick="setFilter('awaiting_approval')">Needs You</button>
      <button onclick="setFilter('completed')">Done</button>
      <button onclick="setFilter('failed')">Failed</button>
    </div>
    <div class="task-feed" id="task-feed"><div class="empty"><div class="icon">🚀</div><p>Ready for orders</p><p style="font-size:.75rem;margin-top:4px">Tap an agent or the quick bar</p></div></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="active" onclick="showView('main')"><span class="nav-emoji">🏠</span>Command</button>
  <button onclick="openChat()"><span class="nav-emoji">💬</span>Chat</button>
  <button onclick="openCreate()"><span class="nav-emoji">➕</span>New</button>
</nav>

<div id="create-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal"><h3>New Mission <button class="close" onclick="closeModal()">✕</button></h3>
    <div id="agent-quick-select" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.8rem"></div>
    <div class="form-group"><label>Or type anything</label><textarea id="nl-input" placeholder="find the best python web framework...&#10;check my email for anything urgent...&#10;write a script that scrapes hacker news..."></textarea></div>
    <div class="form-row"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="sendNL()">Send</button></div>
  </div>
</div>

<div id="detail-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detail-content"></div>
</div>

<script>
const API='/api';let TOKEN=localStorage.getItem('ah_token')||'';let filter='';let agentsData={};let pollTimer;

document.addEventListener('DOMContentLoaded',()=>{if(!TOKEN){TOKEN=prompt('Enter access token:')||'';if(TOKEN)localStorage.setItem('ah_token',TOKEN)}refreshAll();pollTimer=setInterval(refreshTasks,6000)});

async function api(m,p,b){let o={method:m,headers:{}};if(TOKEN)o.headers['Authorization']='Bearer '+TOKEN;if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}let r=await fetch(API+p,o);if(r.status===401){alert('Invalid token');localStorage.removeItem('ah_token');TOKEN=''}if(!r.ok){let e=await r.json().catch(()=>({}));throw new Error(e.detail||r.statusText)}return r.json()}

function showView(n){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+n)?.classList.add('active');document.querySelectorAll('.bottom-nav button').forEach((b,i)=>b.classList.toggle('active',i===['main'].indexOf(n)))}

async function refreshAll(){try{let a=await api('GET','/agents');agentsData=a;renderAgentGrid(a);let h=await api('GET','/health');document.getElementById('stat-line').textContent=`${h.agents.length} agents · ${h.tasks_active||0} active`}catch(e){}refreshTasks()}

function renderAgentGrid(agents){
  let g=document.getElementById('agent-grid');let qs=document.getElementById('agent-quick-select');
  let html='';let qhtml='';
  for(let[k,a]of Object.entries(agents)){
    if(k==='orchestrator')continue;
    let color=a.color||'#3b82f6';let bg=color+'1a';
    html+=`<div class="agent-card" style="--agent-color:${color};--agent-color-bg:${bg}" onclick="agentQuick('${k}')">
      <span class="emoji">${a.emoji||'🤖'}</span>
      <div class="aname">${a.name}</div>
      <div class="persona">${a.personality||''}</div>
      <div class="caps-count">${Object.keys(a.capabilities||{}).length} abilities</div>
    </div>`;
    qhtml+=`<button style="--agent-color:${color};background:${bg};border:1px solid ${color}33;color:${color};padding:.3rem .7rem;border-radius:14px;font-size:.7rem;cursor:pointer" onclick="agentQuick('${k}');closeModal()">${a.emoji} ${a.name}</button>`;
  }
  g.innerHTML=html;qs.innerHTML=qhtml;
}

function agentQuick(name){let a=agentsData[name];if(!a)return;let caps=Object.keys(a.capabilities||{});if(caps.length===1){quickCmd(name,caps[0])}else{openCreate();document.getElementById('nl-input').value=`${name} `;document.getElementById('nl-input').focus()}}

async function quickCmd(agent,action,query=''){try{await api('POST','/tasks',{agent,action,params:{query}});toast('Mission launched!');refreshTasks()}catch(e){alert(e.message)}}

async function refreshTasks(){try{let p='/tasks?limit=40';if(filter)p+='&status='+filter;let tasks=await api('GET',p);renderTasks(tasks)}catch(e){}}

function renderTasks(tasks){
  let f=document.getElementById('task-feed');
  if(!tasks.length){f.innerHTML='<div class="empty"><div class="icon">🚀</div><p>Ready for orders</p></div>';return}
  f.innerHTML=tasks.map(t=>{
    let a=agentsData[t.agent]||{};let em=a.emoji||'📌';let col=a.color||'#3b82f6';
    let s=t.status.replace(/_/g,' ');let time=new Date(t.created_at).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    let preview=(t.result?.summary||t.error||'').substring(0,180);
    let acts='';
    if(t.status==='awaiting_approval')acts=`<button class="btn btn-success btn-sm" onclick="event.stopPropagation();doAct('${t.id}','approve')">Approve</button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();doAct('${t.id}','cancel')">Reject</button>`;
    if(t.status==='queued'||t.status==='running')acts=`<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();doAct('${t.id}','cancel')">Cancel</button>`;
    return`<div class="task-msg" style="--agent-color:${col};--agent-color-bg:${col}1a" onclick="openDetail('${t.id}')">
      <div class="t-emoji">${em}</div><div class="t-body">
        <div class="t-head"><strong style="color:var(--agent-color,var(--text))">${a.name||t.agent}</strong><span class="badge ${t.status}">${s}</span></div>
        <div class="t-meta">${time} · ${t.action}</div>
        ${preview?`<div class="t-preview">${esc(preview)}</div>`:''}
        ${acts?`<div class="t-actions">${acts}</div>`:''}
      </div></div>`
  }).join('')}

function setFilter(s){filter=s;document.querySelectorAll('.status-bar button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');refreshTasks()}
async function doAct(id,act){await api('POST',`/tasks/${id}/${act}`);toast(act==='approve'?'Approved!':'Cancelled');refreshTasks()}

function openCreate(){document.getElementById('create-modal').style.display='flex';document.getElementById('nl-input').focus()}
function closeModal(){document.getElementById('create-modal').style.display='none'}
async function sendNL(){let text=document.getElementById('nl-input').value.trim();if(!text)return;closeModal();
  try{await api('POST','/tasks',{agent:'orchestrator',action:'solve',params:{goal:text}});toast('Thinking...');refreshTasks();document.getElementById('nl-input').value=''}catch(e){alert(e.message)}}

function openChat(){openCreate();document.getElementById('nl-input').placeholder='Chat with Atlas...'}

async function openDetail(id){try{let t=await api('GET',`/tasks/${id}`);let a=agentsData[t.agent]||{};let r=t.result?JSON.stringify(t.result,null,2):(t.error||'No result');document.getElementById('detail-content').innerHTML=`<h3>${a.emoji||''} ${a.name||t.agent}/${t.action} <button class="close" onclick="closeDetail()">✕</button></h3><div class="rel"><button class="copy-btn" onclick="navigator.clipboard.writeText(\`${r.replace(/`/g,'\\`')}\`);toast('Copied')">Copy</button><div class="detail-body"><pre>${esc(r)}</pre></div></div>`;document.getElementById('detail-modal').style.display='flex'}catch(e){alert(e.message)}}
function closeDetail(){document.getElementById('detail-modal').style.display='none'}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){let t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
</script>
</body>
</html>
